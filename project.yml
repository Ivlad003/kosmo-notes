name: JarvisNote
xcodeVersion: "16.3"

options:
  bundleIdPrefix: dev.jarvisnote
  deploymentTarget:
    macOS: "12.3"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0

targets:
  JarvisNote:
    type: application
    platform: macOS
    deploymentTarget: "12.3"
    sources:
      - App
    resources:
      - path: App/Resources
    info:
      path: App/Info.plist
      properties:
        CFBundleName: Jarvis Note
        CFBundleDisplayName: Jarvis Note
        CFBundleIdentifier: dev.jarvisnote.studio
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.0.1"
        CFBundlePackageType: APPL
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSMicrophoneUsageDescription: "Jarvis Note records your microphone for meeting notes and dictation."
        NSScreenCaptureUsageDescription: "Jarvis Note records system audio (e.g. participants in a Meet/Zoom call) when system audio is enabled."
    entitlements:
      path: App/JarvisNote.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jarvisnote.studio
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "12.3"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        ENABLE_APP_SANDBOX: "NO"
        OTHER_LDFLAGS: ""
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeychainAccess
        product: KeychainAccess
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
