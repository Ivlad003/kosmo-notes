name: KosmoNotes
xcodeVersion: "16.3"

options:
  bundleIdPrefix: dev.kosmonotes
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
  HaishinKit:
    url: https://github.com/shogo4405/HaishinKit.swift
    from: 1.9.5
  KosmoNotesCore:
    path: .

targets:
  KosmoNotes:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - App
    resources:
      - path: App/Resources
    info:
      path: App/Info.plist
      properties:
        CFBundleName: KosmoNotes
        CFBundleDisplayName: KosmoNotes
        CFBundleIdentifier: dev.kosmonotes.studio
        # CFBundleVersion is the *seed* value here; the postBuildScripts
        # entry below overwrites it with a YYYYMMDD.HHMM timestamp on every
        # build, so each rebuild has a visibly distinct build number in the
        # menu-bar version line.
        CFBundleVersion: "13"
        CFBundleShortVersionString: "0.0.2"
        CFBundlePackageType: APPL
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSMicrophoneUsageDescription: "KosmoNotes records your microphone for meeting notes and dictation."
        NSScreenCaptureUsageDescription: "KosmoNotes records system audio (e.g. participants in a Meet/Zoom call) when system audio is enabled."
        NSCameraUsageDescription: "KosmoNotes shows a floating webcam bubble during screen recording so your face is captured alongside your screen."
    entitlements:
      path: App/KosmoNotes.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.kosmonotes.studio
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Sign with a stable Apple Development identity (free Apple ID auto-cert).
        # Without a real Team ID, TCC keys grants by binary cdhash — every rebuild
        # invalidates the previous Microphone / Screen Recording grant. With this
        # Team ID + bundle ID combo, TCC keys by identity instead and grants
        # persist across rebuilds.
        # CODE_SIGN_IDENTITY left empty: with Automatic style + DEVELOPMENT_TEAM
        # set, Xcode picks the right cert ("Apple Development" on Xcode 26+,
        # "Mac Development" on older toolchains) and provisions automatically.
        # If you don't have a cert, run `security find-identity -v -p codesigning`
        # — it must list "Apple Development: <name> (<TeamID>)". Set up via
        # Xcode → Settings → Accounts → Apple ID → Manage Certificates → +.
        DEVELOPMENT_TEAM: "7CP69K73N6"
        CODE_SIGN_STYLE: "Automatic"
        ENABLE_HARDENED_RUNTIME: "NO"
        ENABLE_APP_SANDBOX: "NO"
        OTHER_LDFLAGS: ""
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeychainAccess
        product: KeychainAccess
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: KosmoNotesCore
        product: CaptureKit
      - package: KosmoNotesCore
        product: TranscriptionKit
      - package: KosmoNotesCore
        product: StorageKit
      - package: KosmoNotesCore
        product: AIKit
      - package: KosmoNotesCore
        product: DictationKit
      - package: KosmoNotesCore
        product: SharingKit
      - package: KosmoNotesCore
        product: StreamingKit
    postBuildScripts:
      # Stamp CFBundleVersion with a YYYYMMDD.HHMM timestamp every build so
      # `KosmoNotes 0.0.2 (20260503.2154)` in the menu changes every time
      # we rebuild. Without this, xcodebuild's incremental cache reuses the
      # previously-baked Info.plist and the build number stays static.
      # `basedOnDependencyAnalysis: false` forces the phase to run on every
      # build regardless of input/output up-to-date checks.
      - name: "Stamp build number with timestamp"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          STAMP=$(date +%Y%m%d.%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${STAMP}" "$INFO_PLIST"
          echo "Stamped CFBundleVersion = ${STAMP}"

  KosmoNotesUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - UITests
    dependencies:
      - target: KosmoNotes
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_TARGET_NAME: KosmoNotes
        DEVELOPMENT_TEAM: "7CP69K73N6"
        CODE_SIGN_STYLE: "Automatic"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: dev.kosmonotes.studio.uitests
    scheme:
      testTargets:
        - KosmoNotesUITests
      gatherCoverageData: false
