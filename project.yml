name: JarvisNote
xcodeVersion: "16.3"

options:
  bundleIdPrefix: dev.jarvisnote
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
  JarvisNoteCore:
    path: .

targets:
  JarvisNote:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - App
    resources:
      - path: App/Resources
    info:
      path: App/Info.plist
      properties:
        CFBundleName: Jarvis Note
        CFBundleDisplayName: Jarvis Note
        CFBundleIdentifier: dev.jarvisnote.studio
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.0.1"
        CFBundlePackageType: APPL
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSMicrophoneUsageDescription: "Jarvis Note records your microphone for meeting notes and dictation."
        NSScreenCaptureUsageDescription: "Jarvis Note records system audio (e.g. participants in a Meet/Zoom call) when system audio is enabled."
    entitlements:
      path: App/JarvisNote.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jarvisnote.studio
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Sign with a stable Apple Development identity (free Apple ID auto-cert).
        # Without a real Team ID, TCC keys grants by binary cdhash — every rebuild
        # invalidates the previous Microphone / Screen Recording grant. With this
        # Team ID + bundle ID combo, TCC keys by identity instead and grants
        # persist across rebuilds.
        # CODE_SIGN_IDENTITY left empty: with Automatic style + DEVELOPMENT_TEAM
        # set, Xcode picks the right cert ("Apple Development" on Xcode 26+,
        # "Mac Development" on older toolchains) and provisions automatically.
        # If you don't have a cert, run `security find-identity -v -p codesigning`
        # — it must list "Apple Development: <name> (<TeamID>)". Set up via
        # Xcode → Settings → Accounts → Apple ID → Manage Certificates → +.
        DEVELOPMENT_TEAM: "7CP69K73N6"
        CODE_SIGN_STYLE: "Automatic"
        ENABLE_HARDENED_RUNTIME: "NO"
        ENABLE_APP_SANDBOX: "NO"
        OTHER_LDFLAGS: ""
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeychainAccess
        product: KeychainAccess
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: JarvisNoteCore
        product: CaptureKit
      - package: JarvisNoteCore
        product: TranscriptionKit
      - package: JarvisNoteCore
        product: StorageKit
      - package: JarvisNoteCore
        product: AIKit
      - package: JarvisNoteCore
        product: DictationKit
      - package: JarvisNoteCore
        product: SharingKit

  JarvisNoteUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - UITests
    dependencies:
      - target: JarvisNote
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_TARGET_NAME: JarvisNote
        DEVELOPMENT_TEAM: "7CP69K73N6"
        CODE_SIGN_STYLE: "Automatic"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: dev.jarvisnote.studio.uitests
    scheme:
      testTargets:
        - JarvisNoteUITests
      gatherCoverageData: false
