name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Soft target: macos-14 runners ship Xcode 15.x; the exact patch may vary
        # as GitHub updates runner images. Adjust the version here if CI fails on
        # "xcode-select: error: invalid developer directory".
        # Common fallbacks: Xcode_15.0.app, Xcode_15.2.app, Xcode_15.4.app
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.2.app || sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

      - name: xcodebuild build
        run: xcodebuild -scheme JarvisNote -configuration Debug -destination 'platform=macOS' build
